<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>新建命盘 · AI三千问</title>
<link rel="stylesheet" href="/css/charts.css?v=1780849316">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== 时间滑动选择器 — 触控拖拽版 ===== */
.time-picker-wrap {
  position: relative;
  margin-top: 0.15rem;
}

.time-picker-labels {
  display: flex;
  margin-bottom: 0.3rem;
  padding: 0 0.6rem;
}

.tp-label {
  flex: 1;
  text-align: center;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  font-weight: 500;
}

.time-picker {
  display: flex;
  gap: 0;
  height: 11rem;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: #fafafa;
  position: relative;
}

/* 渐变遮罩 */
.time-picker::before,
.time-picker::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 3.6rem;
  z-index: 3;
  pointer-events: none;
}
.time-picker::before {
  top: 0;
  background: linear-gradient(to bottom, #fafafa 15%, transparent 100%);
}
.time-picker::after {
  bottom: 0;
  background: linear-gradient(to top, #fafafa 15%, transparent 100%);
}

.time-col {
  flex: 1;
  overflow: hidden;
  position: relative;
  text-align: center;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.time-col:first-child {
  border-right: 1px solid var(--border);
}

/* 选项轨道 — 触控拖拽的核心 */
.time-track {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  will-change: transform;
}

.time-opt {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 2.5rem;
  font-size: 1.05rem;
  color: #bababa;
  transition: color 0.18s ease, font-weight 0.18s ease, font-size 0.18s ease;
  user-select: none;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
}

.time-opt.near {
  color: #8c8c8c;
  font-weight: 450;
}

.time-opt.selected {
  color: var(--text);
  font-weight: 650;
  font-size: 1.3rem;
}

/* 高亮指示条 */
.time-highlight {
  position: absolute;
  left: 0.5rem;
  right: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  height: 2.5rem;
  border-top: 1.5px solid #c8c8c8;
  border-bottom: 1.5px solid #c8c8c8;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.018) 0%,
    rgba(0,0,0,0.04) 50%,
    rgba(0,0,0,0.018) 100%
  );
  pointer-events: none;
  border-radius: 10px;
  z-index: 2;
}

/* 时间显示条 */
.time-display-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 0.35rem;
  font-size: 0.7rem;
}
.td-label { color: var(--text-dim); }
.td-value {
  color: var(--text);
  font-weight: 600;
  font-size: 0.78rem;
  font-variant-numeric: tabular-nums;
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  letter-spacing: 0.04em;
}

/* 星期几显示 */
.date-info {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
  text-align: center;
  min-height: 1.1rem;
}

/* ===== 地点搜索框 ===== */
.place-search-wrap {
  position: relative;
  margin-bottom: 0.5rem;
}

.place-search {
  width: 100%;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.55rem 0.7rem;
  font-size: 0.85rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}

.place-search:focus {
  border-color: var(--border-active);
}

.place-search::placeholder {
  color: var(--text-dim);
}

/* 搜索建议下拉 */
.place-suggestions {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  max-height: 14rem;
  overflow-y: auto;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  z-index: 100;
  display: none;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.03);
}

.place-suggestions.show {
  display: block;
}

.place-suggest-item {
  padding: 0.55rem 0.7rem;
  cursor: pointer;
  font-size: 0.82rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.place-suggest-item:last-child {
  border-bottom: none;
}

.place-suggest-item:hover,
.place-suggest-item.active {
  background: var(--bg-hover);
}

.place-suggest-item .path {
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-left: 0.3rem;
}

.place-suggest-empty {
  padding: 0.7rem;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-dim);
}

/* ===== 省市区选择器 ===== */
.region-row {
  display: flex; gap: 0.4rem;
}

.region-row select {
  flex: 1; min-width: 0;
}

.coord-display {
  margin-top: 0.4rem;
  font-size: 0.72rem;
  color: var(--text-dim);
  display: flex; gap: 0.8rem;
}

/* 农历日期提示 */
.lunar-hint {
  font-size: 0.72rem;
  color: var(--accent);
  margin-top: 0.15rem;
  text-align: center;
}

/* 返回按钮 */

/* ===== 底部弹出日历面板 ===== */
.cal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s var(--ease);
}
.cal-overlay.show { opacity: 1; pointer-events: auto; }

.cal-panel {
  width: 100%; max-width: 500px;
  margin: 0 auto;
  background: #1a1a24;
  border-radius: 20px 20px 0 0;
  color: #e8e3d8;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: env(safe-area-inset-bottom);
  max-height: 76vh;
  overflow-y: auto;
}
.cal-overlay.show .cal-panel { transform: translateY(0); }

.cal-panel-header {
  text-align: center;
  padding: 0.8rem 1.2rem 0.3rem;
}
.cal-panel-title {
  font-family: "Noto Serif SC", serif;
  font-size: 0.95rem; color: #e8e3d8;
  letter-spacing: 0.08em;
}

/* 日历面板 — 三段滚轮选择器（复刻时间选择器） */
.cal-picker-labels {
  display: flex; padding: 0.3rem 0.6rem;
}
.cal-plabel {
  flex: 1; text-align: center;
  font-size: 0.65rem; color: #6a6458;
  letter-spacing: 0.12em; font-weight: 500;
}
.cal-picker {
  display: flex; height: 11rem;
  border: 1px solid rgba(232,227,216,0.1);
  border-radius: 14px; overflow: hidden;
  background: #14141c; position: relative;
  margin: 0 0.4rem;
}
.cal-picker::before, .cal-picker::after {
  content: ''; position: absolute; left: 0; right: 0;
  height: 3.6rem; z-index: 3; pointer-events: none;
}
.cal-picker::before {
  top: 0;
  background: linear-gradient(to bottom, #14141c 15%, transparent 100%);
}
.cal-picker::after {
  bottom: 0;
  background: linear-gradient(to top, #14141c 15%, transparent 100%);
}
.cal-col {
  flex: 1; overflow: hidden; position: relative;
  text-align: center; touch-action: none;
  user-select: none; -webkit-user-select: none;
}
.cal-col + .cal-col { border-left: 1px solid rgba(232,227,216,0.06); }

.cal-track {
  position: absolute; left: 0; right: 0; top: 0;
  will-change: transform;
}

.cal-opt {
  display: flex; align-items: center; justify-content: center;
  height: 2.5rem; font-size: 1.05rem;
  color: #56514a;
  transition: color 0.18s ease, font-weight 0.18s ease, font-size 0.18s ease;
  user-select: none; cursor: pointer;
  font-variant-numeric: tabular-nums;
  font-family: 'DM Mono','SF Mono',monospace;
}
.cal-opt.near { color: #8a8478; font-weight: 450; }
.cal-opt.selected {
  color: #e8e3d8; font-weight: 650; font-size: 1.3rem;
}

.cal-highlight {
  position: absolute; left: 0.5rem; right: 0.5rem;
  top: 50%; transform: translateY(-50%);
  height: 2.5rem;
  border-top: 1.5px solid rgba(184,150,10,0.45);
  border-bottom: 1.5px solid rgba(184,150,10,0.45);
  background: linear-gradient(180deg,
    rgba(184,150,10,0.03) 0%,
    rgba(184,150,10,0.06) 50%,
    rgba(184,150,10,0.03) 100%
  );
  pointer-events: none; border-radius: 10px; z-index: 2;
}

.cal-display-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 0.5rem; padding: 0.4rem 0 0.25rem;
  font-size: 0.7rem;
}
.cal-display-bar .cd-label { color: #6a6458; }
.cal-display-bar .cd-value {
  color: #e8e3d8; font-weight: 600; font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
  font-family: 'DM Mono','SF Mono',monospace;
}

.cal-footer {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.3rem 1.2rem 0.8rem;
}
.cal-footer .lunar-preview {
  font-size: 0.7rem; color: #6a6458;
}
.cal-footer .confirm-btn {
  padding: 0.4rem 1.2rem;
  border-radius: 10px;
  background: #b8960a;
  color: #fff;
  font-weight: 600;
  font-size: 0.78rem;
  border: none; cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.04em;
}

/* 日期显示区域（替代原生 input date） */
.date-display {
  width: 100%;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.55rem 0.7rem;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.2s;
  display: flex; align-items: center;
  justify-content: space-between;
  min-height: 2.55rem;
}
.date-display:hover { border-color: var(--border-active); }
.date-display .dd-text { font-variant-numeric: tabular-nums; }
.date-display .dd-icon {
  font-size: 0.75rem;
  color: var(--text-dim);
  transition: transform 0.2s;
}

/* 底部留白给悬浮导航 */
.charts-footer {
  padding-bottom: 3rem;
}
</style>
</head>
<body>

<div class="charts-wrapper" id="app">
  <header class="charts-header">
    <h1>新建命盘</h1>
  </header>

  <div class="form-card">

    <!-- 姓名 -->
    <div class="form-row">
      <label>姓名</label>
      <input type="text" id="f-name" placeholder="输入姓名" autocomplete="off">
    </div>

    <!-- 出生日期 — 自定义日历选择 -->
    <div class="form-row">
      <label>出生日期</label>
      <div class="date-display" id="dateDisplay">
        <span class="dd-text" id="dateDisplayText"></span>
        <span class="dd-icon">📅</span>
      </div>
      <div class="date-info" id="dateInfo"></div>
    </div>

    <!-- 出生时间 — 滑动选择 -->
    <div class="form-row">
      <label>出生时间</label>
      <div class="time-picker-wrap">
        <div class="time-picker-labels">
          <span class="tp-label">时</span>
          <span class="tp-label">分</span>
        </div>
        <div class="time-picker" id="timePicker">
          <div class="time-col" id="hourCol">
            <div class="time-track" id="hourTrack"></div>
            <div class="time-highlight"></div>
          </div>
          <div class="time-col" id="minCol">
            <div class="time-track" id="minTrack"></div>
            <div class="time-highlight"></div>
          </div>
        </div>
      </div>
      <div class="time-display-bar">
        <span class="td-label">当前选择</span>
        <span class="td-value" id="timeDisplay">—</span>
      </div>
    </div>

    <!-- 性别 -->
    <div class="form-row">
      <label>性别</label>
      <select id="f-gender">
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </div>

    <!-- 出生地选择 -->
    <div style="margin-top:0.4rem">
      <div class="form-row">
        <label>出生地</label>

        <!-- 搜索框：一键搜索全国城市及地区 -->
        <div class="place-search-wrap">
          <input type="text" class="place-search" id="placeSearch"
            placeholder="🔍 搜索城市或区县名称，一键填入…"
            autocomplete="off">
          <div class="place-suggestions" id="placeSuggestions"></div>
        </div>

        <!-- 层级选择 -->
        <div class="region-row">
          <select id="f-province">
            <option value="">省份</option>
          </select>
          <select id="f-city" disabled>
            <option value="">城市</option>
          </select>
          <select id="f-district" disabled>
            <option value="">区县</option>
          </select>
        </div>
        <div class="coord-display" id="coordDisplay" style="display:none">
          <span id="coordLat"></span>
          <span id="coordLng"></span>
        </div>
      </div>
    </div>

    <!-- 真太阳时 -->
    <div class="form-row" style="margin-top:0.2rem">
      <div class="solar-toggle">
        <input type="checkbox" id="f-true-solar" checked>
        <label for="f-true-solar">使用真太阳时</label>
      </div>
    </div>

    <button class="btn-submit-chart" id="btn-submit">开始排盘</button>
  </div>

  <footer class="charts-footer">AI三千问 · 命理排盘系统</footer>
</div>

<!-- 底部弹出日历面板 — 年/月/日三段滚轮 -->
<div class="cal-overlay" id="calOverlay">
  <div class="cal-panel" id="calPanel">
    <div class="cal-panel-header">
      <span class="cal-panel-title">选择日期</span>
    </div>
    <div class="cal-picker-labels">
      <span class="cal-plabel">年</span>
      <span class="cal-plabel">月</span>
      <span class="cal-plabel">日</span>
    </div>
    <div class="cal-picker" id="calPicker">
      <div class="cal-col" id="calColYear">
        <div class="cal-track" id="calTrackYear"></div>
        <div class="cal-highlight"></div>
      </div>
      <div class="cal-col" id="calColMonth">
        <div class="cal-track" id="calTrackMonth"></div>
        <div class="cal-highlight"></div>
      </div>
      <div class="cal-col" id="calColDay">
        <div class="cal-track" id="calTrackDay"></div>
        <div class="cal-highlight"></div>
      </div>
    </div>
    <div class="cal-display-bar">
      <span class="cd-label">当前选择</span>
      <span class="cd-value" id="calValueDisplay">—</span>
    </div>
    <div class="cal-footer">
      <span class="lunar-preview" id="calLunarPreview"></span>
      <button class="confirm-btn" id="calConfirm">确定</button>
    </div>
  </div>
</div>

<script src="/js/lunar.min.js"></script>
<script src="/js/auth.js?v=5"></script>
<script src="/js/charts-store.js?v=4"></script>
<script src="/js/china-regions.js?v=2"></script>
<script>
(function(){
  'use strict';

  // ===== 登录检查 =====
  if (!AUTH.isLoggedIn()) { window.location.href = '/login/'; return; }

  // ===== 工具 =====
  function pad(n) { return String(n).padStart(2, '0'); }

  // ===== 编辑模式 =====
  var pageParams = new URLSearchParams(window.location.search);
  var editMode = pageParams.get('action') === 'edit';
  var editId = pageParams.get('id');

  // 编辑模式：立即更新标题，防止闪烁
  if (editMode && editId) {
    document.title = '编辑命盘 · AI三千问';
    document.querySelector('.charts-header h1').textContent = '编辑命盘';
  }

  // ===== 状态 =====
  var selectedHour = 12;
  var selectedMinute = 0;
  var selectedLat = null;
  var selectedLng = null;
  var selectedPlace = '';
  var now = new Date();

  // ===== 日历滚轮选择器（年/月/日三段） =====
  var selectedYear, selectedMonth, selectedDay;
  var todayYear = now.getFullYear();
  var todayMonth = now.getMonth() + 1;
  var todayDay = now.getDate();

  selectedYear = todayYear;
  selectedMonth = todayMonth;
  selectedDay = todayDay;

  var YEAR_MIN = 1900, YEAR_MAX = 2100;

  function updateDateDisplay() {
    var text = selectedYear + '年' + pad(selectedMonth) + '月' + pad(selectedDay) + '日';
    document.getElementById('dateDisplayText').textContent = text;
    updateDateInfo(selectedYear + '-' + pad(selectedMonth) + '-' + pad(selectedDay));
  }

  function updateDateInfo(dateStr) {
    if (!dateStr) { document.getElementById('dateInfo').textContent = ''; return; }
    var d = new Date(dateStr + 'T00:00:00');
    var days = ['日','一','二','三','四','五','六'];
    document.getElementById('dateInfo').textContent = '星期' + days[d.getDay()];
  }

  updateDateDisplay();

  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

  function updateLunarPreview(y, m, d) {
    try {
      var solar = Solar.fromYmd(y, m, d);
      var lunar = solar.getLunar();
      document.getElementById('calLunarPreview').textContent =
        lunar.getYearInChinese() + '年 ' + lunar.getMonthInChinese() + '月' + lunar.getDayInChinese();
    } catch(e) { document.getElementById('calLunarPreview').textContent = ''; }
  }

  function updateCalValueDisplay() {
    document.getElementById('calValueDisplay').textContent =
      selectedYear + '-' + pad(selectedMonth) + '-' + pad(selectedDay);
    updateLunarPreview(selectedYear, selectedMonth, selectedDay);
  }

  // 构建滚轮
  var calColYear = document.getElementById('calColYear');
  var calColMonth = document.getElementById('calColMonth');
  var calColDay = document.getElementById('calColDay');
  var calTrackYear = document.getElementById('calTrackYear');
  var calTrackMonth = document.getElementById('calTrackMonth');
  var calTrackDay = document.getElementById('calTrackDay');

  function buildCalTrack(track, count, padLen, formatter) {
    track.innerHTML = '';
    for (var i = 1; i <= count; i++) {
      var opt = document.createElement('div');
      opt.className = 'cal-opt';
      opt.textContent = formatter ? formatter(i) : String(i).padStart(padLen || 2, '0');
      opt.dataset.index = i;
      track.appendChild(opt);
    }
  }

  var dayCount = daysInMonth(selectedYear, selectedMonth);
  buildCalTrack(calTrackYear, YEAR_MAX - YEAR_MIN + 1, 4, function(i) { return YEAR_MIN + i - 1; });
  buildCalTrack(calTrackMonth, 12, 2);
  buildCalTrack(calTrackDay, dayCount, 2);

  function getCalMetrics() {
    var firstOpt = calTrackYear.querySelector('.cal-opt');
    return { itemH: firstOpt ? firstOpt.offsetHeight : 40, colH: calColYear.offsetHeight || 176 };
  }

  function updateCalHighlight(track, idx) {
    var children = track.children;
    for (var i = 0; i < children.length; i++) {
      children[i].classList.remove('selected', 'near');
      var dist = Math.abs(i - idx);
      if (dist === 0) children[i].classList.add('selected');
      else if (dist <= 2) children[i].classList.add('near');
    }
  }

  function snapCalTrack(track, idx, animate) {
    var m = getCalMetrics();
    var ty = m.colH / 2 - (idx * m.itemH + m.itemH / 2);
    track.style.transition = animate ? 'transform 0.35s cubic-bezier(0.23, 1, 0.32, 1)' : 'none';
    track.style.transform = 'translateY(' + ty + 'px)';
  }

  function setCalDate(yearIdx, monthIdx, dayIdx, animate) {
    selectedYear = YEAR_MIN + yearIdx;
    selectedMonth = monthIdx + 1;
    var maxDay = daysInMonth(selectedYear, selectedMonth);
    if (dayIdx >= maxDay) dayIdx = maxDay - 1;
    selectedDay = dayIdx + 1;
    if (dayCount !== maxDay) {
      dayCount = maxDay;
      buildCalTrack(calTrackDay, dayCount, 2);
      calDayCtrl = makeCalDraggable(calColDay, calTrackDay, dayCount, function(idx) {
        selectedDay = idx + 1; updateCalValueDisplay();
      }, { momentumFactor: 0.3, overscrollItems: 3 });
      calDayCtrl.snapTo(selectedDay - 1);
    }
    snapCalTrack(calTrackYear, yearIdx, animate);
    snapCalTrack(calTrackMonth, monthIdx, animate);
    if (dayIdx < dayCount) snapCalTrack(calTrackDay, dayIdx, animate);
    updateCalHighlight(calTrackYear, yearIdx);
    updateCalHighlight(calTrackMonth, monthIdx);
    updateCalHighlight(calTrackDay, Math.min(dayIdx, dayCount - 1));
    updateCalValueDisplay();
  }

  // 复刻 makeDraggable（日历专用）
  function makeCalDraggable(col, track, totalCount, onChange, cfg) {
    cfg = cfg || {};
    var mf = cfg.momentumFactor != null ? cfg.momentumFactor : 0.3;
    var os = cfg.overscrollItems != null ? cfg.overscrollItems : 4;
    var startY = 0, startTY = 0, startIdx = 0, dragging = false, currentIdx = 0;
    var lastMoveTime = 0, lastMoveY = 0, peakMargin = 0;

    function readTY() {
      var m = track.style.transform.match(/translateY\((-?[\d.]+)px\)/);
      return m ? parseFloat(m[1]) : 0;
    }
    function idxFromTY(ty) {
      var m = getCalMetrics();

  // ===== 真太阳时计算（查表法） =====
  function calcTrueSolarTime(birthYear, birthMonth, birthDay, birthHour, birthMinute, longitude) {
    var stdTotalMin = birthHour * 60 + birthMinute;

    // 1. 一年中的第几天
    var dateObj = new Date(birthYear, birthMonth - 1, birthDay);
    var startOfYear = new Date(birthYear, 0, 1);
    var dayOfYear = Math.floor((dateObj - startOfYear) / (1000 * 60 * 60 * 24)) + 1;

    // 2. 查表获取 EoT（分钟）
    var EoT = EOT_TABLE[dayOfYear - 1];

    // 3. 平太阳时 = 北京时间 + 4×(经度-120) 分钟
    var meanSolarMin = stdTotalMin + 4 * (longitude - 120);

    // 4. 真太阳时 = 平太阳时 + EoT
    var TST_local_min = meanSolarMin + EoT;

    // 处理跨日
    while (TST_local_min < 0) TST_local_min += 24 * 60;
    while (TST_local_min >= 24 * 60) TST_local_min -= 24 * 60;

    var adjustedHour = Math.floor(TST_local_min / 60);
    var adjustedMinute = Math.round(TST_local_min % 60);
    if (adjustedMinute === 60) { adjustedMinute = 0; adjustedHour = (adjustedHour + 1) % 24; }

    return { hour: adjustedHour, minute: adjustedMinute };
  }

  // ===== 真太阳时（始终可用，仅控制后端计算逻辑） =====

  // ===== 构建搜索索引（全国城市+区县扁平索引） =====
  var searchIndex = []; // [{ text, provinceIdx, cityIdx, distIdx, path }]

  CHINA_REGIONS.forEach(function(prov, pi){
    prov.c.forEach(function(city, ci){
      // 城市级别
      searchIndex.push({
        text: city.n,
        provinceIdx: pi,
        cityIdx: ci,
        distIdx: -1,
        path: prov.n + ' · ' + city.n
      });
      // 区县级别
      if (city.d) {
        city.d.forEach(function(dist, di){
          searchIndex.push({
            text: dist.n,
            provinceIdx: pi,
            cityIdx: ci,
            distIdx: di,
            path: prov.n + ' · ' + city.n + ' · ' + dist.n
          });
        });
      }
    });
  });

  // ===== 省市区联动 =====
  var provSel = document.getElementById('f-province');
  var citySel = document.getElementById('f-city');
  var distSel = document.getElementById('f-district');
  var coordDisplay = document.getElementById('coordDisplay');
  var coordLat = document.getElementById('coordLat');
  var coordLng = document.getElementById('coordLng');

  // 填充省份
  CHINA_REGIONS.forEach(function(prov, i){
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = prov.n;
    provSel.appendChild(opt);
  });

  // 省份变更 → 更新城市
  provSel.addEventListener('change', function(){
    citySel.innerHTML = '<option value="">城市</option>';
    distSel.innerHTML = '<option value="">区县</option>';
    citySel.disabled = true;
    distSel.disabled = true;
    coordDisplay.style.display = 'none';
    selectedLat = null; selectedLng = null; selectedPlace = '';

    var provIdx = parseInt(this.value);
    if (isNaN(provIdx)) return;

    var cities = CHINA_REGIONS[provIdx].c;
    cities.forEach(function(city, i){
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = city.n;
      citySel.appendChild(opt);
    });
    citySel.disabled = false;
  });

  // 城市变更 → 更新区县 + 经纬度
  citySel.addEventListener('change', function(){
    distSel.innerHTML = '<option value="">区县</option>';
    distSel.disabled = true;
    var provIdx = parseInt(provSel.value);
    var cityIdx = parseInt(this.value);
    if (isNaN(provIdx) || isNaN(cityIdx)) {
      coordDisplay.style.display = 'none'; selectedLat = null; selectedLng = null; return;
    }

    var cityData = CHINA_REGIONS[provIdx].c[cityIdx];

    // 有区级数据
    if (cityData.d && cityData.d.length > 0) {
      cityData.d.forEach(function(dist, i){
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = dist.n;
        distSel.appendChild(opt);
      });
      distSel.disabled = false;
    }

    // 默认使用城市中心坐标
    if (cityData.lat !== undefined && cityData.lng !== undefined) {
      setCoord(cityData.lat, cityData.lng,
        CHINA_REGIONS[provIdx].n + ' ' + cityData.n);
    }
  });

  // 区县变更 → 更新经纬度
  distSel.addEventListener('change', function(){
    var provIdx = parseInt(provSel.value);
    var cityIdx = parseInt(citySel.value);
    var distIdx = parseInt(this.value);
    if (isNaN(provIdx) || isNaN(cityIdx) || isNaN(distIdx)) return;

    var cityData = CHINA_REGIONS[provIdx].c[cityIdx];
    var distData = cityData.d[distIdx];
    if (distData && distData.lat !== undefined) {
      setCoord(distData.lat, distData.lng,
        CHINA_REGIONS[provIdx].n + ' ' + cityData.n + ' ' + distData.n);
    }
  });

  function setCoord(lat, lng, place) {
    selectedLat = lat; selectedLng = lng; selectedPlace = place;
    coordLat.textContent = '纬度 ' + lat.toFixed(4) + '°';
    coordLng.textContent = '经度 ' + lng.toFixed(4) + '°';
    coordDisplay.style.display = 'flex';
  }

  // ===== 地点搜索功能 =====
  var placeSearch = document.getElementById('placeSearch');
  var placeSuggestions = document.getElementById('placeSuggestions');
  var searchTimer = null;

  placeSearch.addEventListener('input', function(){
    clearTimeout(searchTimer);
    var query = this.value.trim();

    if (!query || query.length < 1) {
      placeSuggestions.classList.remove('show');
      return;
    }

    // 防抖 200ms
    searchTimer = setTimeout(function(){
      doSearch(query);
    }, 200);
  });

  // 点击外部关闭建议
  document.addEventListener('click', function(e){
    if (!e.target.closest('.place-search-wrap')) {
      placeSuggestions.classList.remove('show');
    }
  });

  // 聚焦时如果已有输入内容则重新搜索
  placeSearch.addEventListener('focus', function(){
    if (this.value.trim()) {
      doSearch(this.value.trim());
    }
  });

  function doSearch(query) {
    var q = query.toLowerCase();
    var results = [];

    // 精确匹配优先，然后前缀匹配，最后包含匹配
    var exact = [], prefix = [], contains = [];

    searchIndex.forEach(function(item){
      var nameLower = item.text.toLowerCase();
      if (nameLower === q) {
        exact.push(item);
      } else if (nameLower.indexOf(q) === 0) {
        prefix.push(item);
      } else if (nameLower.indexOf(q) !== -1) {
        contains.push(item);
      }
    });

    results = exact.concat(prefix).concat(contains).slice(0, 30);

    if (results.length === 0) {
      placeSuggestions.innerHTML = '<div class="place-suggest-empty">未找到匹配的地区 (｡•́︿•̀｡)</div>';
      placeSuggestions.classList.add('show');
      return;
    }

    var html = '';
    results.forEach(function(item, idx){
      // 高亮匹配文字
      var displayName = highlightMatch(item.text, query);
      html += '<div class="place-suggest-item" data-idx="' + idx + '" ' +
        'data-pi="' + item.provinceIdx + '" ' +
        'data-ci="' + item.cityIdx + '" ' +
        'data-di="' + item.distIdx + '">' +
        '<span>' + displayName + '</span>' +
        '<span class="path">' + item.path + '</span>' +
        '</div>';
    });

    placeSuggestions.innerHTML = html;
    placeSuggestions.classList.add('show');

    // 点击建议项 → 一键填入
    placeSuggestions.querySelectorAll('.place-suggest-item').forEach(function(el){
      el.addEventListener('click', function(){
        var pi = parseInt(this.dataset.pi);
        var ci = parseInt(this.dataset.ci);
        var di = parseInt(this.dataset.di);

        // 选中省份
        provSel.value = pi;
        provSel.dispatchEvent(new Event('change'));

        // 等 city 填充完后选中城市
        setTimeout(function(){
          citySel.value = ci;
          citySel.dispatchEvent(new Event('change'));

          // 如果是区县级别，再选中区县
          if (di >= 0) {
            setTimeout(function(){
              distSel.value = di;
              distSel.dispatchEvent(new Event('change'));
            }, 50);
          }
        }, 50);

        // 关闭建议
        placeSuggestions.classList.remove('show');
        // 更新搜索框显示完整路径
        var resultItem = searchIndex.find(function(item){
          return item.provinceIdx === pi && item.cityIdx === ci && item.distIdx === di;
        });
        if (resultItem) {
          placeSearch.value = resultItem.path;
        }
      });
    });
  }

  function highlightMatch(text, query) {
    var idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.substring(0, idx) +
      '<em style="color:var(--accent);font-style:normal">' +
      text.substring(idx, idx + query.length) + '</em>' +
      text.substring(idx + query.length);
  }

  // ===== 提交 =====
  document.getElementById('btn-submit').addEventListener('click', submitChart);

  async function submitChart() {
    var name = document.getElementById('f-name').value.trim() || '未命名';
    var gender = document.getElementById('f-gender').value;
    var calendar = 'gregorian';
    var trueSolarTime = document.getElementById('f-true-solar').checked;

    var birthYear = selectedYear;
    var birthMonth = selectedMonth;
    var birthDay = selectedDay;

    if (birthYear < 1900 || birthYear > 2100) { alert('年份超出范围（1900-2100）'); return; }

    var birthHour = selectedHour;
    var birthMinute = selectedMinute;

    // 真太阳时：校验地点
    if (trueSolarTime && (selectedLat === null || selectedLng === null)) {
      alert('请选择出生地（省份/城市/区县） (｡•́︿•̀｡)');
      return;
    }

    var btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.textContent = '保存中…';

    try {
      var payload = {
        name: name, gender: gender,
        birthYear: birthYear, birthMonth: birthMonth, birthDay: birthDay,
        birthHour: birthHour, birthMinute: birthMinute,
        calendar: calendar,
        trueSolarTime: trueSolarTime,
        birthplace: selectedPlace,
        latitude: selectedLat, longitude: selectedLng
      };

      var result;
      if (editMode && editId) {
        result = await ChartsStore.update(editId, payload);
      } else {
        result = await ChartsStore.add(payload);
      }

      window.location.href = '/my-charts/?id=' + result.id;
    } catch(e) {
      alert('保存失败: ' + (e.message || '请稍后重试'));
      btn.disabled = false; btn.textContent = '开始排盘';
    }
  }
})();
</script>
</body>
</html>
