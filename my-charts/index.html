<style>
:root {
  --radius-sm: 10px;

.mc-page { max-width: 500px; margin: 0 auto; padding: 0 1rem 5rem; }

.mc-topbar { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 0 0.6rem; }

.mc-topbar .mc-add-btn:hover { color:var(--text); border-color:var(--border-active); background:var(--bg-hover); }

/* ===== 列表卡片 ===== */
.mc-list { display:flex; flex-direction:column; gap:0.5rem; }

.mc-card { display:flex; align-items:center; padding:1rem 1.05rem; background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:var(--radius-md); cursor:pointer; transition:all 0.25s; }
.mc-card:active { transform:scale(0.98); }

.mc-card .card-zodiac { width:2.6rem; height:2.6rem; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; background:linear-gradient(135deg, rgba(184,150,10,0.12), transparent); margin-right:0.8rem; }

.mc-card .card-body { flex:1; min-width:0; }
.mc-card .card-name { font-size:0.92rem; font-weight:500; color:var(--text); letter-spacing:0.04em; margin-bottom:0.2rem; }
.mc-card .card-name { font-size:0.92rem; font-weight:500; color:var(--text); letter-spacing:0.04em; margin-bottom:0.15rem; }
.mc-card .card-info { font-size:0.78rem; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-card .card-arrow { font-size:1.2rem; color:var(--text-dim); cursor:pointer; padding:0.2rem; border-radius:50%; transition:all 0.2s; display:block; line-height:1; }
.mc-card .card-arrow:hover { background:rgba(0,0,0,0.04); }
/* 右侧元数据区 */
.mc-card .card-meta-right { display:flex; flex-direction:column; align-items:center; flex-shrink:0; margin-left:0.4rem; }
.mc-card .card-create-time { font-size:0.55rem; color:var(--text-dim); margin-top:2px; white-space:nowrap; opacity:0.7; }

.card-menu-popup .menu-item.danger { color:#c94a4a; }

.mc-empty { text-align:center; padding:4rem 1.5rem 2rem; }
.mc-empty .empty-icon { font-size:3rem; margin-bottom:0.6rem; opacity:0.3; }

// ============================================================
// 四柱八字计算（23:00后算次日）
// ============================================================

function calcBazi(year, month, day, hour, minute) {
  var adjYear = year, adjMonth = month, adjDay = day;
  var baziHour = hour;
  // 23:00 后属于次日子时
  if (hour >= 23) {
    var next = new Date(year, month - 1, day + 1);
    adjYear = next.getFullYear();
    adjMonth = next.getMonth() + 1;
    adjDay = next.getDate();
    baziHour = 0;
  }
  try {
    var s = Solar.fromYmdHms(adjYear, adjMonth, adjDay, baziHour, minute || 0, 0);
    var l = s.getLunar();
    var ec = l.getEightChar();
    return {
      year: ec.getYearGan() + ec.getYearZhi(),
      month: ec.getMonthGan() + ec.getMonthZhi(),
      day: ec.getDayGan() + ec.getDayZhi(),
      time: ec.getTimeGan() + ec.getTimeZhi()
    };
  } catch(e) { return null; }
}

function renderDetail(chart) {
  var birthYear = chart.birth.year;
  var birthMonth = chart.birth.month;
  var birthDay = chart.birth.day;
  var birthHour = chart.birth.hour ?? 12;
  var birthMinute = chart.birth.minute ?? 0;

  var gender = chart.gender==='male'?'男':'女';
  var isMale = chart.gender==='male';

  // 生肖
  var zIdx = (birthYear - 4) % 12;
  if (zIdx < 0) zIdx += 12;
  var zodiacEmoji = ZODIAC_EMOJI[zIdx];
  var zodiacName = ZODIAC_NAMES[zIdx];

  // 年干 → 阴年/阳年
  var ganIdx = (birthYear - 4) % 10;
  if (ganIdx < 0) ganIdx += 10;
  var isYang = (ganIdx % 2 === 0); // 甲(0)丙(2)戊(4)庚(6)壬(8)=阳
  var yy = isYang ? '阳' : '阴';
  var zk = isMale ? '乾造' : '坤造';

  // 阳历时间
  var solarTime = birthYear+'-'+pad(birthMonth)+'-'+pad(birthDay)+' '+pad(birthHour)+':'+pad(birthMinute)+':00';

  // 时辰
  var scIdx = Math.floor(((birthHour + 1) % 24) / 2);

  // 农历（优先用服务端计算的）
  var lunarStr = '';
  if (chart.lunar && chart.lunar.year) {
    lunarStr = chart.lunar.year+'年'+chart.lunar.month+'月'+chart.lunar.day+'日';
  } else {
    try {
      var solar = Solar.fromYmdHms(birthYear, birthMonth, birthDay, birthHour, birthMinute, 0);
      var lunar = solar.getLunar();
      var lm = lunar.getMonth() < 0 ? '闰' + (-lunar.getMonth()) : lunar.getMonth();
      lunarStr = lunar.getYear()+'年'+lm+'月'+lunar.getDay()+'日';
    } catch(e) { lunarStr = '-'; }
  }

  // 计算真太阳时
  var trueSolarStr = '';
  if (chart.trueSolarTime && chart.longitude) {
    var dateObj = new Date(birthYear, birthMonth-1, birthDay);
    var startOfYear = new Date(birthYear, 0, 1);
    var dayOfYear = Math.floor((dateObj - startOfYear)/86400000) + 1;
    var EoT = EOT_TABLE[dayOfYear-1];
    var lng = Number(chart.longitude);

    // 正向计算：原始时间 + 经度修正 + EoT
    var adjMin = birthHour*60 + birthMinute + 4*(lng - 120) + EoT;
    while (adjMin < 0) adjMin += 1440;
    while (adjMin >= 1440) adjMin -= 1440;
    var adjH = Math.floor(adjMin/60);
    var adjMi = Math.round(adjMin%60);
    if (adjMi===60) { adjMi=0; adjH=(adjH+1)%24; }

    trueSolarStr = birthYear+'-'+pad(birthMonth)+'-'+pad(birthDay)+' '+pad(adjH)+':'+pad(adjMi)+':00';
  }

  var h = '';
  h += '<div class="detail-page">';
  if (isAdminView) {
    h += '<a href="/admin/" class="detail-back">← 返回后台</a>';
  } else {
    h += '<a href="/my-charts/" class="detail-back">← 返回列表</a>';
  }

  // Hero
  h += '<div class="detail-hero">';
  h += '<div class="zodiac-frame">'+zodiacEmoji+'</div>';
  h += '<div class="hero-name">'+esc(chart.name)+'</div>';
  h += '</div>';

  // 四柱八字（优先服务端数据，回退客户端计算）
  var bazi;
  if (chart.bazi) {
    var baziParts = chart.bazi.split(' ');
    if (baziParts.length === 4) {
      bazi = { year: baziParts[0], month: baziParts[1], day: baziParts[2], time: baziParts[3] };
    }
  }
  if (!bazi) { bazi = calcBazi(birthYear, birthMonth, birthDay, birthHour, birthMinute); }

  if (bazi) {
    h += '<div style="text-align:center;padding:0 1rem 0.4rem;">';
    h += '<div style="display:flex;justify-content:center;gap:0.6rem;">';
    h += '<div class="bazi-pillar"><span class="bazi-ganzhi">'+bazi.year+'</span><span class="bazi-label">年柱</span></div>';
    h += '<div class="bazi-pillar"><span class="bazi-ganzhi">'+bazi.month+'</span><span class="bazi-label">月柱</span></div>';
    h += '<div class="bazi-pillar"><span class="bazi-ganzhi">'+bazi.day+'</span><span class="bazi-label">日柱</span></div>';
    h += '<div class="bazi-pillar"><span class="bazi-ganzhi">'+bazi.time+'</span><span class="bazi-label">时柱</span></div>';
    h += '</div></div>';
  }

  // 信息表
  h += '<div class="detail-sheet">';

  // 姓名 + 性别
  h += '<div class="sheet-row split">';
  h += '<div class="half"><span class="label">姓名：</span><span class="value">'+esc(chart.name)+' <span class="red-tag">('+yy+' '+zk+')</span></span></div>';
  h += '<div class="half"><span class="label">性别：</span><span class="value">'+gender+'</span></div>';
  h += '</div>';

  // 农历 + 生肖
  h += '<div class="sheet-row split">';
  h += '<div class="half"><span class="label">农历：</span><span class="value">'+lunarStr+'</span></div>';
  h += '<div class="half"><span class="label">生肖：</span><span class="value">'+zodiacName+'</span></div>';
  h += '</div>';

  // 阳历
  h += '<div class="sheet-row">';
  h += '<span class="label">阳历：</span><span class="value">'+solarTime+'</span>';
  h += '</div>';

  // 真太阳时
  if (trueSolarStr) {
    h += '<div class="sheet-row">';
    h += '<span class="label">真太阳时：</span><span class="value">'+trueSolarStr+'</span>';
    h += '</div>';
  }

  // 出生地区
  if (chart.birthplace) {
    h += '<div class="sheet-row">';
    h += '<span class="label">出生地区：</span><span class="value">'+esc(chart.birthplace)+'</span>';
    h += '</div>';
  }

  // 创建时间
  if (chart.createdAt) {
    h += '<div class="sheet-row">';
    h += '<span class="label">创建时间：</span><span class="value">'+formatDateTime(chart.createdAt)+'</span>';
    h += '</div>';
  }

  h += '</div>';

  // 操作
  h += '<div class="detail-actions">';
  if (isAdminView) {
    h += '<a href="/admin/" class="btn">← 返回后台</a>';
  } else {
    h += '<a href="/charts/?action=edit&id='+chart.id+'" class="btn">编辑此命盘</a>';
    h += '<button class="btn btn-danger" onclick="doDelete(\''+chart.id+'\')">删除此命盘</button>';
  }
  h += '</div>';

  h += '</div>';
  document.getElementById('mc-content').innerHTML = h;
}

// ============================================================
// ⋯ 弹出菜单
// ============================================================

window.toggleMenu = function(chartId, chartName) {
  event.stopPropagation();
  var menu = document.getElementById('card-menu');
  if (menu && menu.dataset.chartId === chartId) { closeMenu(); return; }
  closeMenu();

  var btn = document.querySelector('#card-'+chartId+' .card-arrow');
  var rect = btn.getBoundingClientRect();

  var overlay = document.createElement('div');
  overlay.className = 'card-menu-overlay';
  overlay.onclick = closeMenu;

  var popup = document.createElement('div');
  popup.className = 'card-menu-popup';
  popup.id = 'card-menu';
  popup.dataset.chartId = chartId;
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.right = (window.innerWidth - rect.right) + 'px';

  popup.innerHTML =
    '<button class="menu-item" onclick="closeMenu();location.href=\'/charts/?action=edit&id='+chartId+'\'">编辑命盘</button>' +
    '<button class="menu-item danger" onclick="closeMenu();doDelete(\''+chartId+'\')">🗑 删除命盘</button>';

  overlay.appendChild(popup);
  document.body.appendChild(overlay);
};

window.closeMenu = function() {
  var m = document.getElementById('card-menu');
  if (m) { var p = m.parentElement; if (p) p.remove(); }
};

// ============================================================
// 删除
// ============================================================

window.doDelete = async function(id) {
  if (!confirm('确定删除这个命盘吗？删除后不可恢复 (｡•́︿•̀｡)')) return;
  try { await ChartsStore.remove(id); window.location.href='/my-charts/'; }
  catch(e) { alert('删除失败: '+(e.message||'请稍后重试')); }
};

// ============================================================
// 工具
// ============================================================

function renderEmpty(icon,title,desc,link,btnText) {
  document.getElementById('mc-content').innerHTML =
    '<div class="mc-empty"><div class="empty-icon">'+icon+'</div><p class="empty-title">'+title+'</p><p class="empty-desc">'+desc+'</p><a href="'+link+'" class="empty-btn">'+btnText+'</a></div>';
}

function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function pad(n) { return String(n).padStart(2,'0'); }

function formatDate(s) {
  try { var d=new Date(s); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  catch(e) { return ''; }
}
function formatDateTime(s) {
  try { var d=new Date(s); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
  catch(e) { return ''; }
}
})();
</script>
