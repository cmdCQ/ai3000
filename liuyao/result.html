<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>排盘结果 · 六爻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --text: #1a1a1a;
  --text-dim: #1a1a1a;
  --text-muted: #1a1a1a;
  --accent: #b8960a;
  --accent-bg: rgba(184,150,10,0.06);
  --border: #e8e3d8;
  --border-active: #d4c9b0;
  --card-bg: #fff;
  --radius: 14px;
  --radius-sm: 10px;
  --sans: "Noto Sans SC", -apple-system, sans-serif;
  --serif: "Noto Serif SC", serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html,body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; -webkit-font-smoothing:antialiased; }
.mh-wrapper { max-width:420px; margin:0 auto; padding:1.5rem 1.2rem 4rem; }
.mh-header { display:flex; flex-wrap:wrap; align-items:center; gap:0.4rem 0.6rem; margin-bottom:1rem; }
.mh-back { color:var(--text-muted); text-decoration:none; font-size:0.85rem; transition:color 0.2s; flex-shrink:0; }
.mh-back:hover { color:var(--text-dim); }
.mh-title { font-family:var(--serif); font-size:1.25rem; font-weight:600; letter-spacing:0.06em; flex-shrink:0; }

/* ===== 排盘信息表格 ===== */
.info-table { width:100%; border-collapse:collapse; font-size:0.78rem; color:var(--text); }
.info-table tr { border-bottom:1px solid var(--border); }
.info-table tr:last-child { border-bottom:none; }
.info-table td { padding:0.2rem 0.5rem; vertical-align:middle; }
.info-table .td-label { color:var(--text); font-weight:500; white-space:nowrap; width:4.5em; font-family:var(--serif); letter-spacing:0.04em; }
.info-table .td-value { color:var(--text); }
.info-table .td-sub { /* 干支四柱的子格 */ padding:0.35rem 0.5rem; text-align:center; border-left:1px solid var(--border); color:var(--text); }
.info-table .td-sub:first-child { border-left:none; }
.info-table .td-pillar { font-weight:500; }
.info-table .td-empty { font-size:0.75rem; }
.info-table .gz-row td { padding:0.3rem 0; font-size:0.8rem; }

/* Card */
.card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.1rem; margin-bottom:0.8rem; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
.card-flush { margin-bottom:0; border-bottom-left-radius:0; border-bottom-right-radius:0; padding-bottom:0.4rem; }
.card-next { margin-bottom:0; border-radius:0; border-top:none; padding-top:0.5rem; }
.card-title { font-family:var(--serif); font-size:0.85rem; font-weight:600; letter-spacing:0.04em; margin-bottom:0.6rem; color:var(--text); }

/* ===== 五卦融合卡片 ===== */
.hex-panel { display:flex; }
.hex-cell { flex:1; min-width:0; text-align:center; padding:0.3rem 0 0.05rem; cursor:pointer; transition:all 0.2s; user-select:none; outline:none; -webkit-tap-highlight-color:transparent; border-radius:var(--radius-sm); }
.hex-cell:hover { background:var(--accent-bg); }
.hex-cell .hlbl { font-size:0.62rem; color:var(--text); margin-bottom:0.25rem; opacity:0.6; }
.hex-cell .hname { font-family:var(--serif); font-size:0.72rem; font-weight:600; margin-top:0.25rem; letter-spacing:0.04em; color:var(--text); white-space:nowrap; }
.hex-cell.active .hname { color:var(--accent); }

/* 爻 display */
.yao-display { display:flex; flex-direction:column; align-items:center; gap:10px; margin:0.25rem 0; }
.yao-line { height:4px; border-radius:2px; }
.yao-yang { width:34px; background:var(--text); }
.yao-yin { width:34px; display:flex; gap:8px; justify-content:center; }
.yao-yin span { width:12px; height:4px; background:var(--text); border-radius:2px; display:block; }
.yao-moving { position:relative; }
.yao-moving::after { content:'○'; position:absolute; right:-12px; top:-3px; font-size:0.65rem; color:var(--accent); font-weight:bold; }

/* 卦象解析区 */
.analysis-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.1rem; margin-top:0.4rem; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
.analysis-card .ac-title { font-family:var(--serif); font-size:0.9rem; font-weight:600; letter-spacing:0.04em; margin-bottom:0.6rem; color:var(--text); }

/* 体用 */
.tiyong-box { margin-top:0.8rem; padding:0.8rem 1rem; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border); }
.tiyong-row { display:flex; align-items:center; gap:0.5rem; font-size:0.82rem; margin-bottom:0.3rem; }
.tiyong-label { font-weight:500; min-width:2.5em; }
.tiyong-badge { font-size:0.68rem; padding:0.1rem 0.5rem; border-radius:8px; font-weight:500; }
.tiyong-badge.ti { background:rgba(184,150,10,0.12); color:var(--accent); }
.tiyong-badge.yong { background:rgba(100,140,200,0.12); color:#5a7fa0; }
.tiyong-verdict { margin-top:0.5rem; padding:0.5rem 0.8rem; border-radius:var(--radius-sm); font-size:0.82rem; font-weight:500; text-align:center; }
.verdict-neutral { background:var(--accent-bg); color:var(--accent); border:1px solid rgba(184,150,10,0.15); }

.load-state { text-align:center; padding:3rem 0; color:var(--text-dim); }
.load-state p { margin-top:0.5rem; font-size:0.85rem; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
@keyframes spin { to{transform:rotate(360deg);} }

@media (max-width:400px) {
  .mh-wrapper { padding:1rem 1rem 4rem; }
}

/* ===== 六十四卦解卦卡片 ===== */
.hex-detail-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:0.8rem 1rem; margin-top:0.6rem; box-shadow:0 1px 4px rgba(0,0,0,0.03); }
.hex-detail-title { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.6rem; }
.hex-detail-title .hd-symbol { font-size:2.2rem; line-height:1; }
.hex-detail-title .hd-name { font-family:var(--serif); font-size:1rem; font-weight:700; }
.hex-detail-title .hd-pinyin { font-size:0.7rem; color:var(--text-muted); opacity:0.6; }
.hex-detail-meta { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.6rem; font-size:0.68rem; }
.hex-detail-meta span { padding:0.15rem 0.5rem; border-radius:6px; background:var(--bg); border:1px solid var(--border); color:var(--text-dim); }
.hex-section { margin-bottom:0.6rem; }
.hex-section-label { font-family:var(--serif); font-size:0.75rem; font-weight:600; color:var(--accent); margin-bottom:0.3rem; letter-spacing:0.04em; }
.hex-section-content { font-size:0.75rem; color:var(--text-dim); line-height:1.7; }
.hex-block-quote { padding:0.5rem 0.8rem; background:var(--bg); border-radius:var(--radius-sm); border-left:3px solid var(--accent); margin-bottom:0.4rem; font-size:0.8rem; color:var(--text); }
.hex-yao-list { display:flex; flex-direction:column; gap:0.3rem; margin-bottom:0.5rem; }
.hex-yao-item { display:flex; align-items:flex-start; gap:0.5rem; padding:0.3rem 0.5rem; border-radius:6px; background:var(--bg); font-size:0.72rem; border:1px solid transparent; }
.hex-yao-item .yao-num { min-width:1.4rem; text-align:center; font-weight:600; color:var(--accent); font-size:0.68rem; padding-top:0.05rem; }
.hex-yao-item .yao-text { flex:1; line-height:1.6; color:var(--text-dim); }
.hex-yongyao { padding:0.3rem 0.5rem; border-radius:6px; background:rgba(184,150,10,0.06); border:1px solid rgba(184,150,10,0.15); font-size:0.72rem; margin-bottom:0.5rem; color:var(--accent); }
.hex-app-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; margin-bottom:0.6rem; }
.hex-app-item { padding:0.5rem; border-radius:var(--radius-sm); font-size:0.7rem; line-height:1.6; }
.hex-app-item.app-career { background:#eff6ff; color:#1e40af; }
.hex-app-item.app-love { background:#fdf2f8; color:#9d174d; }
.hex-app-item.app-decision { background:#f0fdf4; color:#166534; }
.hex-app-item.app-warning { background:#fef2f2; color:#991b1b; }
.hex-scenarios { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:0.4rem; }
.hex-scenarios span { padding:0.15rem 0.6rem; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:0.65rem; color:var(--text-dim); }
.hex-related { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:0.4rem; }
.hex-related a { text-decoration:none; padding:0.15rem 0.6rem; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:0.65rem; color:var(--text-dim); cursor:pointer; transition:all 0.2s; }
.hex-related a:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
.hex-history { font-size:0.7rem; color:var(--text-dim); line-height:1.7; padding:0.5rem 0.8rem; background:linear-gradient(135deg, #fffbeb, #ffedd5); border-radius:var(--radius-sm); border:1px solid rgba(184,150,10,0.15); }
.hex-keywords { display:flex; flex-wrap:wrap; gap:0.3rem; }
.hex-keywords span { font-size:0.62rem; padding:0.1rem 0.5rem; border-radius:8px; background:var(--bg); color:var(--text-muted); opacity:0.7; }

/* ===== AI 智能解析按钮（嵌入标题栏） ===== */
.ai-title-btn {
  display:inline-flex; align-items:center; gap:0.25rem;
  width:100%; justify-content:center;
  padding:0.4rem 0.7rem;
  font-family:var(--sans);
  font-size:0.82rem; font-weight:500;
  color:#fff;
  background:linear-gradient(135deg, #b8960a, #d4a91c);
  border:none; border-radius:10px;
  cursor:pointer;
  white-space:nowrap;
  transition:all 0.2s;
  box-shadow:0 2px 8px rgba(184,150,10,0.3);
  text-shadow:0 1px 1px rgba(0,0,0,0.1);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.ai-title-btn:hover { opacity:0.88; box-shadow:0 3px 10px rgba(184,150,10,0.4); }
.ai-title-btn:active { transform:scale(0.97); }

/* AI 面板 */
.ai-panel-overlay {
  position:fixed; inset:0; z-index:99;
  background:rgba(0,0,0,0.25);
  display:none;
  animation:aiFadeIn 0.2s ease;
}
@keyframes aiFadeIn { from{opacity:0} to{opacity:1} }

.ai-panel {
  position:fixed; left:0; right:0; bottom:0; z-index:101;
  max-width:420px; margin:0 auto;
  max-height:70vh;
  background:var(--card-bg);
  border-radius:16px 16px 0 0;
  border:1px solid var(--border);
  border-bottom:none;
  box-shadow:0 -4px 24px rgba(0,0,0,0.1);
  display:none;
  flex-direction:column;
  animation:aiSlideUp 0.25s ease;
  overflow:hidden;
}
@keyframes aiSlideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.ai-panel.open { display:flex; }
.ai-panel-overlay.open { display:block; }

.ai-panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.9rem 1.1rem 0.6rem;
  font-family:var(--serif);
  font-size:0.9rem; font-weight:600;
  color:var(--text);
  flex-shrink:0;
}
.ai-panel-close {
  cursor:pointer; font-size:1.2rem;
  color:var(--text-muted); opacity:0.5;
  transition:opacity 0.2s; line-height:1;
}
.ai-panel-close:hover { opacity:1; }

.ai-panel-body {
  padding:0 1.1rem 1rem;
  overflow-y:auto;
  flex:1;
  -webkit-overflow-scrolling:touch;
}

.ai-panel-body textarea {
  width:100%;
  padding:0.6rem 0.8rem;
  font-size:0.82rem;
  font-family:var(--sans);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--text);
  outline:none;
  resize:none;
  transition:border-color 0.2s;
  line-height:1.6;
}
.ai-panel-body textarea:focus { border-color:var(--border-active); }
.ai-panel-body textarea::placeholder { color:var(--text-muted); }

.ai-send-row {
  display:flex; gap:0.5rem; margin-top:0.5rem;
}
.ai-send-row button {
  flex:1; padding:0.55rem;
  font-size:0.82rem; font-family:var(--sans); font-weight:500;
  border:none; border-radius:var(--radius-sm);
  cursor:pointer;
  transition:opacity 0.2s;
}
.ai-btn-primary {
  background:var(--accent); color:#fff;
  box-shadow:0 2px 6px rgba(184,150,10,0.2);
}
.ai-btn-primary:hover { opacity:0.85; }
.ai-btn-primary:disabled { opacity:0.4; cursor:default; }
.ai-btn-cancel {
  background:var(--bg); color:var(--text-dim);
  border:1px solid var(--border);
}
.ai-btn-cancel:hover { border-color:var(--border-active); }

/* AI 响应区 */
.ai-response {
  margin-top:0.8rem;
  font-size:0.82rem;
  line-height:1.9;
  color:var(--text);
  display:none;
}
.ai-response.show { display:block; }

.ai-response .ai-loading {
  display:flex; align-items:center; gap:0.5rem;
  padding:0.8rem;
  color:var(--text-dim);
  font-size:0.8rem;
}
.ai-response .ai-loading .ai-spinner {
  width:18px; height:18px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:aiSpin 0.7s linear infinite;
}
@keyframes aiSpin { to{transform:rotate(360deg)} }

.ai-response .ai-error {
  padding:0.6rem 0.8rem;
  background:#fef2f2;
  color:#991b1b;
  border-radius:var(--radius-sm);
  font-size:0.78rem;
}

.ai-response .ai-empty-hint {
  text-align:center;
  padding:1.5rem 0;
  color:var(--text-muted);
  font-size:0.78rem;
  line-height:1.8;
}

.ai-response .ai-result {
  padding:0.8rem;
  background:var(--bg);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
}

.ai-response .ai-result p { margin-bottom:0.4rem; }
.ai-response .ai-result p:last-child { margin-bottom:0; }
.ai-response .ai-result strong { color:var(--accent); font-weight:600; }
.ai-response .ai-result ol,
.ai-response .ai-result ul { padding-left:1.2rem; margin-bottom:0.4rem; }
.ai-response .ai-result li { margin-bottom:0.2rem; }

/* 无事项状态 */
.ai-no-topic {
  text-align:center; padding:0.8rem;
  font-size:0.78rem; color:var(--text-muted);
  line-height:1.8;
}
.ai-no-topic a { color:var(--accent); text-decoration:none; }

/* 底部留白 */
.mh-wrapper { padding-bottom:5.5rem; }

/* 追问输入栏 */
.ai-start-btn {
  display:inline-block;
  padding:0.7rem 2rem;
  font-size:0.88rem;
  font-family:var(--serif);
  font-weight:600;
  color:#fff;
  background:var(--accent);
  border:none;
  border-radius:12px;
  cursor:pointer;
  letter-spacing:0.06em;
  box-shadow:0 3px 12px rgba(184,150,10,0.3);
  transition:opacity 0.2s, transform 0.15s;
}
.ai-start-btn:hover { opacity:0.85; transform:translateY(-1px); }
.ai-start-btn:active { transform:translateY(0); }

.ai-followup-bar {
  display:none;
  margin-top:0.8rem;
  padding-top:0.6rem;
  border-top:1px solid var(--border);
}
.ai-followup-bar.show { display:block; }
.ai-followup-input {
  width:100%;
  padding:0.55rem 0.7rem;
  font-size:0.8rem;
  font-family:var(--sans);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--text);
  outline:none;
  resize:none;
  transition:border-color 0.2s;
  line-height:1.5;
}
.ai-followup-input:focus { border-color:var(--border-active); }
.ai-followup-input::placeholder { color:var(--text-muted); }
.ai-followup-row {
  display:flex; gap:0.4rem; margin-top:0.4rem;
}
.ai-followup-row button {
  flex-shrink:0; padding:0.5rem 0.9rem;
  font-size:0.78rem; font-family:var(--sans); font-weight:500;
  border:none; border-radius:var(--radius-sm);
  cursor:pointer; transition:opacity 0.15s;
}
.ai-followup-send {
  background:var(--accent); color:#fff;
}
.ai-followup-send:hover { opacity:0.85; }
.ai-followup-send:disabled { opacity:0.4; cursor:default; }

/* 追问历史区域 */
.ai-followup-hist {
  margin-top:0.6rem;
}
.ai-followup-item {
  margin-top:0.5rem;
  padding:0.5rem 0.7rem;
  background:var(--bg);
  border-radius:var(--radius-sm);
  border-left:3px solid var(--accent);
  font-size:0.78rem;
  line-height:1.7;
}
.ai-followup-item .fq {
  font-size:0.72rem;
  color:var(--text-muted);
  margin-bottom:0.3rem;
}
.ai-followup-item .fq-label {
  color:var(--accent);
  font-weight:500;
}

.hd{display:flex;flex-wrap:wrap;gap:0;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:0.6rem 0.6rem 0.3rem;margin-bottom:0.8rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}.ht{width:50%;border-collapse:collapse;font-size:0.72rem;background:transparent}.ht+.ht{border-left:1px solid var(--border)}.ht-title th{font-size:0.82rem;font-weight:700;text-align:center;color:var(--text);padding:0.2rem 0.1rem 0.25rem;letter-spacing:0.03em;font-family:var(--serif)}.hr td{text-align:center;padding:0.16rem 0;line-height:1;vertical-align:middle;white-space:nowrap;font-size:0.68rem}.h-ls{color:#b02c2c;width:1.2rem;font-size:0.64rem}.h-lq{color:var(--text);width:1.1rem;font-size:0.66rem}.h-dz{color:var(--text);width:1.5rem;font-size:0.66rem}.h-bar{width:1.6rem;text-align:center}.h-bar .b-yang{display:inline-block;width:16px;height:2.5px;background:var(--text);border-radius:1px}.h-bar .b-yin{display:inline-flex;gap:3px;justify-content:center}.h-bar .b-yin i{display:block;width:6px;height:2.5px;background:var(--text);border-radius:1px}.h-mv{width:0.9rem;font-size:0.65rem;color:var(--text);text-align:center}.h-mv.x{color:#b02c2c}.h-sp{width:1.2rem}.h-gs td{text-align:center;font-size:0.62rem;color:#b02c2c;padding:0.06rem 0;border-bottom:none}.h-bottom{display:flex;justify-content:space-between;font-size:0.68rem;color:#1a7d33;font-weight:500;background:transparent;padding:0.2rem 0.4rem 0}@media(max-width:480px){.ht{width:50%}.ht-title th{font-size:0.76rem;padding:0.15rem 0.05rem}.hr td{padding:0.12rem 0;font-size:0.64rem}.h-ls{width:1rem;font-size:0.6rem}.h-lq{width:1rem;font-size:0.62rem}.h-dz{width:1.4rem;font-size:0.62rem}.h-bar{width:1.4rem}.h-mv{width:0.8rem;font-size:0.6rem}}@media(max-width:480px){.ht{width:50%}.ht-title th{font-size:0.75rem}.hr td{padding:0.12rem 0}.h-ls{width:1rem;font-size:0.6rem}.h-lq{width:1rem;font-size:0.6rem}.h-dz{width:1.4rem;font-size:0.6rem}.h-bar{width:1.4rem}.h-mv{width:0.8rem;font-size:0.6rem}}.hbl{text-align:left}.hbr{text-align:right}
.hex-bottom .bl { text-align:left; }
.hex-bottom .br { text-align:right; }

@media (max-width:400px) {
  .mh-wrapper { padding-bottom:5rem; }
  .ai-panel { max-height:75vh; }
}
</style>
</head>
<body>

<div class="mh-wrapper">
  <div class="mh-header">
    <a href="/liuyao/" class="mh-back">← 返回排盘</a>
    <h1 class="mh-title">排盘结果</h1>
    <button class="ai-title-btn" id="aiBarBtn" onclick="toggleAIPanel()">☯ 看不懂？试试自动解析</button>
  </div>

  <div id="contentArea">
    <div class="load-state">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=6"></script>
<script src="/js/hexagrams_data.js?v=1"></script>
<script>

}
function linesToTri(lines) {
  var k=lines.join(''), m={'111':1,'110':2,'101':3,'100':4,'011':5,'010':6,'001':7,'000':8};

// ===== 获取卦宫信息 =====
function getPalaceInfo(upper, lower) {
  var table = buildPalaceTable();
  var key = upper+'_'+lower;
  return table[key] || { palace:upper, palaceName:TRIGRAMS[upper].name, palaceElement:PALACE_ELEMENT[upper], generation:'未知', shi:6, ying:3 };
}

// ===== 获取本卦各爻的纳甲信息 =====
function getYaoInfo(upper, lower) {
  var lines = guaToLines(upper, lower); // [上,五,四,三,二,初]
  var info = [];
  // 上卦地支: NAJIA[upper].dizhi[0]=上爻(6),[1]=五爻(5),[2]=四爻(4)
  // 下卦地支: NAJIA[lower].dizhi[0]=三爻(3),[1]=二爻(2),[2]=初爻(1)
  var upperDi = NAJIA[upper].dizhi;
  var lowerDi = NAJIA[lower].dizhi;
  var upperWx = NAJIA[upper].wuxing;
  var lowerWx = NAJIA[lower].wuxing;
  var allDizhi = [upperDi[0],upperDi[1],upperDi[2],lowerDi[3],lowerDi[4],lowerDi[5]];
  var allWuxing = [upperWx[0],upperWx[1],upperWx[2],lowerWx[3],lowerWx[4],lowerWx[5]];
  for (var i = 0; i < 6; i++) {
    info.push({ dizhi:allDizhi[i], wuxing:allWuxing[i], yang:lines[i]===1 });
  }
  return info; // [上爻(0),五爻(1),四爻(2),三爻(3),二爻(4),初爻(5)]
}

// ===== 计算六神 =====
function getLiuShen(dayGan, lineIdx) {
  var start = LIUSHEN_START[dayGan] || 0;
  var idx = (start + lineIdx) % 6;
  return LIUSHEN[idx];
}

// ===== 计算六亲 =====
function getLiuQin(palaceElement, yaoElement) {
  if (palaceElement === yaoElement) return '兄弟';
  if (WUXING_SHENG[yaoElement] === palaceElement) return '父母';   // 生我
  if (WUXING_SHENG[palaceElement] === yaoElement) return '子孙';    // 我生
  if (WUXING_KE[palaceElement] === yaoElement) return '妻财';      // 我克
  if (WUXING_KE[yaoElement] === palaceElement) return '官鬼';      // 克我
  return '';
}

  if (!gz) return '';
  return gz.charAt(0);
}

function getGuaShen(upper, lower, shiPos) {
  var yaoInfo = getYaoInfo(upper, lower);

  var map = {子:'初',丑:'二',寅:'三',卯:'四',辰:'五',巳:'六',午:'初',未:'二',申:'三',酉:'四',戌:'五',亥:'六'};
  var posName = map[shiDizhi];
  var idx = {初:5,二:4,三:3,四:2,五:1,六:0}[posName];
  return yaoInfo[idx].dizhi;
}

function renderHexDuo(benGua, bianGua) {
  var u1=benGua.upper,l1=benGua.lower,u2=bianGua.upper,l2=bianGua.lower;
  var p1=getPalaceInfo(u1,l1),p2=getPalaceInfo(u2,l2);
  var y1=getYaoInfo(u1,l1),y2=getYaoInfo(u2,l2);
  var dg=getDayGanFromGZ((g&&g.dayGZ)||'');
  var gs=getGuaShen(u1,l1,p1.shi);
  var bl=guaToLines(u1,l1),b2=guaToLines(u2,l2);
  var ord=[0,1,2,3,4,5];
  function q(pe,wx){if(pe===wx)return'兄弟';var s={木:'火',火:'土',土:'金',金:'水',水:'木'},k={木:'土',土:'水',水:'火',火:'金',金:'木'};
    if(s[wx]===pe)return'父母';if(s[pe]===wx)return'子孙';if(k[pe]===wx)return'妻财';if(k[wx]===pe)return'官鬼';return'';}
  function ls(dg,yi){var a=['青龙','朱雀','勾陈','螣蛇','白虎','玄武'];
    return a[(({甲:0,乙:0,丙:1,丁:1,戊:2,己:3,庚:4,辛:4,壬:5,癸:5}[dg]||0)+yi)%6];}
  function bar(y){return y?'<span class="b-yang"></span>':'<span class="b-yin"><i></i><i></i></span>';}
  function hexTable(hex, palace, yaos, lines, isBen){
    var h='<table class="ht"><tr class="ht-title"><th colspan="5">'+hex.name+'('+palace.palaceName+'宫)</th></tr>';
    for(var ri=0;ri<6;ri++){
      var yi=ord[ri],yy=yaos[yi];
      var lq=q(palace.palaceElement,yy.wuxing);
      var yang=lines[yi]===1;
      var ch=isBen&&lines[yi]!==b2[yi];
      var xo=ch?(yang?'0→':'X→'):'',xc=ch?(yang?'o':'x'):'';
      h+='<tr class="hr">';
      if(isBen){h+='<td class="h-ls">'+ls(dg,5-yi)+'</td>';}
      else{h+='<td class="h-sp"></td>';}
      h+='<td class="h-lq">'+lq+'</td>';
      h+='<td class="h-dz">'+yy.dizhi+yy.wuxing+'</td>';
      h+='<td class="h-bar">'+bar(yang)+'</td>';
      h+='<td class="h-mv'+(xc?' '+xc:'')+'">'+xo+'</td>';
      h+='</tr>';
      if(isBen&&ri===2) h+='<tr class="h-gs"><td></td><td colspan="4">卦身为'+gs+'</td></tr>';
    }
    h+='</table>';
    return h;
  }
  var h='<div class="hd">'+hexTable(benGua,p1,y1,bl,true)
    +'<div class="h-div"></div>'+hexTable(bianGua,p2,y2,b2,false)+'</div>';
  h+='<div class="h-bottom"><span>本卦：'+benGua.name+'卦</span><span>变卦</span></div>';
  return h;
}

function formatTime(date) {
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0')+' '+
         String(date.getHours()).padStart(2,'0')+':'+String(date.getMinutes()).padStart(2,'0')+':'+String(date.getSeconds()).padStart(2,'0');
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function load() {
  var area = document.getElementById('contentArea');
  var urlParams = new URLSearchParams(window.location.search);
  var id = urlParams.get('id');
  var isAdmin = urlParams.get('admin') === '1';

  if (id) {
    try {
      var token;
      if (isAdmin) {
        // 管理员查看：使用 admin token
        token = localStorage.getItem('sqw_admin_token');
      } else {
        token = AUTH.getToken();
      }
      var headers = token ? { 'Authorization':'Bearer '+token } : {};
      var resp = await fetch('/api/liuyao-records/'+id, { headers:headers });
      if (!resp.ok) {
        area.innerHTML = '<div class="load-state"><p>排盘记录不存在或已删除</p></div>';
        return;
      }
      currentRecordId = id;
      var data = await resp.json();
      var result = typeof data.result_data === 'string' ? JSON.parse(data.result_data) : data.result_data;
      result.topic = data.topic;
      result.createdAt = data.created_at ? new Date(data.created_at) : null;
      savedAnalysis = data.ai_analysis || '';
      area.innerHTML = renderResult(result);
      renderAnalysis();
      // 有保存的AI解读则在状态栏显示
      if (savedAnalysis) {
        var barBtn = document.getElementById('aiBarBtn');
        if (barBtn) barBtn.innerHTML = '<span class="ai-icon">☯</span><span>看不懂？试试自动解析</span>';
      }
    } catch(e) {
      area.innerHTML = '<div class="load-state"><p>加载失败，请重试</p></div>';
    }
  } else {
    var stored = localStorage.getItem('liuyao_result') || sessionStorage.getItem('liuyao_result');
    if (!stored) {
      area.innerHTML = '<div class="load-state"><p>没有排盘结果</p><a href="/liuyao/" style="color:var(--accent);font-size:0.85rem;text-decoration:none;margin-top:0.5rem;display:inline-block">返回排盘</a></div>';
      return;
    }
    localStorage.removeItem('liuyao_result');
    sessionStorage.removeItem('liuyao_result');
    var result = JSON.parse(stored);
    area.innerHTML = renderResult(result);
    renderAnalysis();
  }
}

load();

var aiStreamAbort = null;
var aiPanelOpen = false;

function toggleAIPanel() {
  aiPanelOpen = !aiPanelOpen;
  document.getElementById('aiPanel').classList.toggle('open', aiPanelOpen);
  document.getElementById('aiPanelOverlay').classList.toggle('open', aiPanelOpen);

function closeAIPanel() {

async function sendFollowUp() {
  // 未登录用户可追问一次
  if (!AUTH.isLoggedIn()) {
    if (localStorage.getItem('liuyao_anon_followup')) {
      var resp = document.getElementById('aiResponse');
      showLoginPrompt(resp);
      var fbar = document.getElementById('aiFollowBar');
      if (fbar) fbar.classList.remove('show');
      return;
    }
  }
  var input = document.getElementById('aiFollowInput');
  var q = input.value.trim();
  if (!q) return;

  var btn = document.getElementById('aiFollowBtn');
  btn.disabled = true;
  btn.textContent = '追问中…';
  input.value = '';
  input.disabled = true;

  // 追加追问历史
  var hist = document.getElementById('aiFollowHist');
  var item = document.createElement('div');
  item.className = 'ai-followup-item';
  item.innerHTML = '<div class="fq"><span class="fq-label">追问：</span>'+escHtml(q)+'</div><div class="ai-loading"><div class="ai-spinner"></div><span>输出中……</span></div>';
  hist.appendChild(item);
  // 滚动到底部
  var body = document.getElementById('aiPanelBody');
  setTimeout(function(){ body.scrollTop = body.scrollHeight; }, 50);

  // 隐藏追问栏（等流结束后再显示）
  var fbar = document.getElementById('aiFollowBar');
  fbar.classList.remove('show');

  var token = AUTH.getToken();
  var headers = { 'Content-Type':'application/json' };
  if (token) headers['Authorization'] = 'Bearer '+token;

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/liuyao/ai-analyze');
  for (var k in headers) xhr.setRequestHeader(k, headers[k]);

  var prevAnswer = savedAnalysis || '';
  var fullText = '';

  xhr.onprogress = function() {
    var newText = xhr.responseText.substring(fullText.length);
    if (newText) {
      fullText = xhr.responseText;
      var ansDiv = item.querySelector('.ai-followup-answer') || document.createElement('div');
      if (!ansDiv.className) { ansDiv.className = 'ai-followup-answer'; item.appendChild(ansDiv); }
      ansDiv.innerHTML = renderMarkdown(fullText);
      body.scrollTop = body.scrollHeight;
    }
  };

  xhr.onloadend = function() {
    btn.disabled = false;
    btn.textContent = '发送';
    input.disabled = false;
    input.focus();
    fbar.classList.add('show');
    // 未登录用户标记已使用追问次数
    if (!AUTH.isLoggedIn()) {
      localStorage.setItem('liuyao_anon_followup', '1');
    }
  };

  xhr.send(JSON.stringify({
    topic: currentTopic,
    followUp: q,
    context: prevAnswer,
    recordId: currentRecordId,
    hexagrams: {
      gender: currentGender,
      benGua: { name:g.benGua.name, upper:g.benGua.upper, lower:g.benGua.lower, upperTri:g.benGua.upperTri, lowerTri:g.benGua.lowerTri },
      bianGua: { name:g.bianGua.name, upper:g.bianGua.upper, lower:g.bianGua.lower, upperTri:g.bianGua.upperTri, lowerTri:g.bianGua.lowerTri }
    }
  }));
}

  var hdr = document.querySelector('.ai-panel-header span:first-child');

  // 显示追问输入栏

async function startAIStream() {
  var resp = document.getElementById('aiResponse');
  resp.className = 'ai-response show';

  try {
    aiStreamAbort = new AbortController();
    
    var token = AUTH.getToken();
    var headers = { 'Content-Type':'application/json' };
    if (token) headers['Authorization'] = 'Bearer '+token;

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/liuyao/ai-analyze');
    for (var k in headers) xhr.setRequestHeader(k, headers[k]);
    
    var fullText = '';
    var ragSourcesLine = '';
    var firstContent = false;
    var respDiv = document.createElement('div');
    respDiv.className = 'ai-result';
    respDiv.innerHTML = '<div class="ai-loading"><div class="ai-spinner"></div><span>正在检索古籍，即将开始解卦…</span></div>';
    resp.innerHTML = '';
    resp.appendChild(respDiv);

    xhr.onreadystatechange = function() {
      if (xhr.readyState >= 2 && !ragSourcesLine) {
        var src = xhr.getResponseHeader('X-Rag-Sources');
        if (src) ragSourcesLine = '📚 **参考古籍**：' + decodeURIComponent(src).split('|').map(function(s){ return '《'+s+'》'; }).join('、');
      }
    };

    xhr.onprogress = function() {
      var newText = xhr.responseText.substring(fullText.length);
      if (newText) {
        if (!firstContent) { firstContent = true; }
        fullText = xhr.responseText;
        var displayText = fullText;
        if (ragSourcesLine) displayText = ragSourcesLine + '\n\n' + fullText;
        respDiv.innerHTML = renderMarkdown(displayText);
        resp.scrollTop = resp.scrollHeight;
      }
    };

    xhr.onerror = function() {
      if (fullText) {
        respDiv.innerHTML = renderMarkdown(fullText) + '<p style="color:#991b1b;font-size:0.75rem;margin-top:0.5rem">⚠ 传输中断，以上为已接收内容</p>';
      } else {
        resp.innerHTML = '<div class="ai-error">❌ 连接失败，请重试</div>';
      }
    };

    xhr.onloadend = function() {
      aiStreamAbort = null;
      // 流完成 → 显示追问输入栏
      var fbar = document.getElementById('aiFollowBar');
      if (fbar) fbar.classList.add('show');
      // 滚动到底部
      var body = document.getElementById('aiPanelBody');
      if (body) setTimeout(function(){ body.scrollTop = body.scrollHeight; }, 100);

      // 有记录ID → 静默保存到后台（去掉 Token 尾行）
      var analysisText = fullText;
      if (analysisText) {
        // 去掉末尾的 Token 消耗行
        var tokenIdx = analysisText.lastIndexOf('\n消耗 Token：');
        if (tokenIdx > 0) analysisText = analysisText.substring(0, tokenIdx).trim();
      }
      if (analysisText && currentRecordId) {
        fetch('/api/liuyao-records/'+currentRecordId+'/ai', {
          method:'PATCH',
          headers:headers,
          body:JSON.stringify({ analysis: analysisText })
        }).catch(function(){});
      }
      if (fullText) {
        savedAnalysis = analysisText || fullText;
        var barBtn = document.getElementById('aiBarBtn');
        if (barBtn) barBtn.innerHTML = '<span class="ai-icon">☯</span><span>看不懂？试试自动解析</span>';
        // 未登录用户标记已使用
        if (!AUTH.isLoggedIn()) {
          localStorage.setItem('liuyao_anon_used', '1');
        }
      }
    };

    xhr.send(JSON.stringify({
      topic: currentTopic,
      recordId: currentRecordId,
      hexagrams: {
        gender: currentGender,
        benGua: { name:g.benGua.name, upper:g.benGua.upper, lower:g.benGua.lower, upperTri:g.benGua.upperTri, lowerTri:g.benGua.lowerTri },
        bianGua: { name:g.bianGua.name, upper:g.bianGua.upper, lower:g.bianGua.lower, upperTri:g.bianGua.upperTri, lowerTri:g.bianGua.lowerTri }
      }
    }));
    
  } catch (e) {
    if (e.name !== 'AbortError') {
      resp.innerHTML = '<div class="ai-error">❌ 解卦失败：'+escHtml(e.message)+'</div>';
    }
  }
}

function renderMarkdown(text) {
  if (!text) return '';
  // 转义 HTML
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 代码块（先处理，避免内部内容被后续规则干扰）
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m,a,code){ return '<pre style="background:#f5f4f0;padding:0.6rem;border-radius:6px;font-size:0.75rem;overflow-x:auto;margin:0.5rem 0;line-height:1.5">'+code.trim()+'</pre>'; });
  // 行内代码
  text = text.replace(/`([^`]+)`/g, '<code style="background:#f5f4f0;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.78rem">$1</code>');
  // 水平分割线
  text = text.replace(/^---+\s*$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:0.6rem 0">');
  // 标题
  text = text.replace(/^### (.+)$/gm, '<h3 style="font-family:var(--serif);font-size:0.85rem;font-weight:600;margin:0.6rem 0 0.3rem;color:var(--text)">$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2 style="font-family:var(--serif);font-size:0.95rem;font-weight:600;margin:0.7rem 0 0.3rem;color:var(--text)">$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1 style="font-family:var(--serif);font-size:1.05rem;font-weight:700;margin:0.8rem 0 0.3rem;color:var(--text)">$1</h1>');
  // 金色区块标题 — 【一、回答】等
  text = text.replace(/^【([^】]+)】/gm, '<div style="font-family:var(--serif);font-size:0.88rem;font-weight:700;color:var(--accent);margin:0.7rem 0 0.2rem;letter-spacing:0.04em">【$1】</div>');
  // 引用块
  text = text.replace(/^> (.+)$/gm, '<blockquote style="padding:0.4rem 0.7rem;margin:0.4rem 0;border-left:3px solid var(--accent);background:var(--bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:0.78rem;color:var(--text-dim);line-height:1.7">$1</blockquote>');
  // 无序列表（- 或 * 开头）
  var ulCount = 0;
  text = text.replace(/^[\s]*[-*] (.+)$/gm, function(m,content){ return '<span style="display:block;padding-left:1.2rem;position:relative;line-height:1.8"><span style="position:absolute;left:0.3rem">•</span>'+content+'</span>'; });
  // 有序列表
  text = text.replace(/^[\s]*\d+\. (.+)$/gm, function(m,content){ return '<span style="display:block;padding-left:1.2rem;line-height:1.8">'+content+'</span>'; });
  // 加粗 — 重点结论用金色
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:var(--accent)">$1</strong>');
  // 斜体
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // 段落：连续非空行用 <p> 包裹，保留 \n 只为分割
  var lines = text.split(/\n/);
  var out = [];
  var inPara = false;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i];
    var isBlock = /^<(h[123]|pre|blockquote|hr|span|div)/.test(l);
    var isLine = /^<br\s*\/?>$/.test(l);
    var isEmpty = l.trim() === '';
    if (isBlock) {
      if (inPara) { out.push('</p>'); inPara = false; }
      out.push(l);
    } else if (isEmpty) {
      if (inPara) { out.push('</p>'); inPara = false; }
    } else {
      if (!inPara) { out.push('<p>'); inPara = true; }
      else { out.push('<br>'); }
      out.push(l);
    }
  }
  if (inPara) out.push('</p>');
  return out.join('');
}
