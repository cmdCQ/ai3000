<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI三千问</title>
<link rel="stylesheet" href="/css/auth.css?v=1780828613">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>AI 三千问</h1>
    <p class="sub">登录以使用 AI 命理解读</p>

    <form class="auth-form" id="loginForm">
      <label>手机号</label>
      <input type="tel" id="phone" placeholder="输入手机号" maxlength="11" autocomplete="tel" required>

      <label>密码</label>
      <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" required>

      <p class="auth-error" id="loginError"></p>
      <button type="submit" class="auth-btn">登录</button>
    </form>

    <p class="auth-link">还没有账号？<a href="/register/">注册</a> · <a href="/forgot-password/">忘记密码？</a></p>
    <a href="/" class="auth-back">← 返回首页</a>
  </div>
</div>

<script src="/js/auth.js?v=5"></script>
<script>
if (AUTH.isLoggedIn()) { window.location.href = '/'; }

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = this.querySelector('button');
  var err = document.getElementById('loginError');
  var phone = document.getElementById('phone').value.trim();
  var pw = document.getElementById('password').value;

  if (!phone || !pw) { err.textContent = '请输入手机号和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中…'; err.textContent = '';

  try {
    var res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, password: pw }),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.cookie = 'sqw_token=' + encodeURIComponent(data.token) + '; path=/; max-age=86400';
    document.cookie = 'sqw_username=' + encodeURIComponent(data.username) + '; path=/; max-age=86400';
    window.location.href = '/';
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '登录';
  }
});
</script>
</body>
</html>
